<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle for visibility on any tab color -->
  <circle cx="100" cy="100" r="100" fill="#282828"/>

  <defs>
    <clipPath id="n-clip">
      <path d="M 34 34 L 34 170 L 100 170 Q 170 170, 170 100 Q 170 34, 100 34 Z"/>
    </clipPath>
  </defs>

  <!-- Orange N -->
  <polyline points="34,164 34,36 164,164 164,36"
            fill="none" stroke="#f18219" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"
            clip-path="url(#n-clip)"/>

  <!-- D shape (white) -->
  <path d="M 24 24 L 24 176 L 100 176 Q 176 176, 176 100 Q 176 24, 100 24 Z"
        fill="none" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- O circle (white) -->
  <circle cx="100" cy="100" r="56" fill="none" stroke="#ffffff" stroke-width="9"/>
</svg>
